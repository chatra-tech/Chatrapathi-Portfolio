<!DOCTYPE html>
<html>
<head>
    <title>Chatrapathi Portfolio</title>
</head>
<body style="font-family: Arial; text-align:center;">

    <h1>Chatrapathi</h1>
    <p>BCA Student | Web Developer</p>

    <h2>About Me</h2>
    <p>I build web applications and learning full stack development.</p>

    <h2>Skills</h2>
    <p>HTML, CSS, JavaScript, Python, Flask</p>

    <h2>Contact Me</h2>
    <form id="form">
        <input type="text" id="name" placeholder="Name" required><br><br>
        <input type="text" id="roll" placeholder="Roll No" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                roll: document.getElementById("roll").value,
                email: document.getElementById("email").value
            };

            const res = await fetch("https://your-backend-url.onrender.com/submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.message);
        });
    </script>

</body>
</html>

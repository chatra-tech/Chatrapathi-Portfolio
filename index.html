<!DOCTYPE html>
<html>
<head>
    <title>Chatrapathi Portfolio</title>
</head>
<body style="text-align:center;font-family:Arial">

    <h1>Chatrapathi</h1>
    <p>BCA Student | Web Developer</p>

    <h2>Contact Me</h2>

    <form id="form">
        <input id="name" placeholder="Name" required><br><br>
        <input id="roll" placeholder="Roll No" required><br><br>
        <input id="email" placeholder="Email" required><br><br>
        <button type="submit">Submit</button>
    </form>

    <h2>Submitted Data</h2>
    <div id="data"></div>

    <script>
        const backend = "https://chatrapathi-portfolio-1.onrender.com"; // 🔴 CHANGE THIS

        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            await fetch(`${backend}/submit`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    roll: document.getElementById("roll").value,
                    email: document.getElementById("email").value
                })
            });

            loadData();
        });

        async function loadData() {
            const res = await fetch(`${backend}/data`);
            const data = await res.json();

            document.getElementById("data").innerHTML =
                data.map(d => `<p>${d.name} | ${d.roll} | ${d.email}</p>`).join("");
        }

        loadData();
    </script>

</body>
</html>
